<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthShield 3X - Secure Door Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #001F3F, #007BFF);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 12px 20px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            width: 250px;
            margin: auto;
            text-decoration: none;
            text-align: center;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔐 AuthShield 3X</h1>
        <p>Welcome! Choose an access method to proceed.</p>

        <div class="btn-container">
            <button  class="btn" onclick="window.location.href='/scan'">📸 Face Recognition</button>  
            <button  class="btn" onclick="window.location.href='/otp'">📩 OTP-Based Entry</button> 
            <button class="btn" onclick="window.location.href='/admin'">🔑 Admin Approval</button>
        </div>
    </div>

</body>
</html>
