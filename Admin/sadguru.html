<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />

     
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script type="module" defer src="script/script.js"></script>


    <style>
      /* Existing styles here */
      hr {
        margin-bottom: 20px; /* Space below the hr */
        border: none; /* Remove default border */
        height: 4px; /* Increase thickness */
        border-radius: 20px; /* Rounded edges */
        background-color: #4270f4; /* Light blue shade */
      }

      .header {
        
         
        margin-bottom: 15px; /* Minimize space after the header */
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .greeting {
        font-size: 16px;
        color: #003366;
      }

      .welcome-title {
        font-size: 24px;
        font-weight: bold;
        color: #003366;
      }

      .user-profile img {
        border-radius: 50%;
        width: 40px;
        height: 40px;
      }

      .notification-bell {
        position: relative;
        margin-right: 15px;
      }

      .notification-bell .notification-indicator {
        width: 10px;
        height: 10px;
        background-color: red;
        border-radius: 50%;
        position: absolute;
        top: 0;
        right: 0;
      }

      .table-container {
        background-color: #ffffff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 15px;
        border-bottom: 2px solid #ccc; /* Light grey border */
      }

      .table-title {
        color: #003366;
        font-size: 20px;
        font-weight: bold;
      }

      .add-user-btn {
        background-color: transparent;
        color: #4270f4;
        padding: 10px 20px;
        border: 2px solid #4270f4;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
      }

      .add-user-btn i {
        margin-right: 8px;
      }

      .add-user-btn:hover {
        background-color: #e8f0ff;
        border-color: #4270f4;
      }

      .table-wrapper {
        border-radius: 15px; /* Outer border round corners */
        overflow: hidden; /* Ensures table stays inside rounded border */
        border: 2px solid #ccc; /* Updated to light grey */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Slight shadow for a 3D look */
        background-color: white; /* Background for full rounded effect */
        margin-top: 20px;
      }

      #list {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        text-align: left;
      }

      #list thead {
        background-color: #8ecae6;
        color: white;
      }

      #list th,
      #list td {
        padding: 12px 15px;
        border: 1px solid #ddd;
      }

      #list tbody tr:nth-child(even) {
        background-color: #f2f2f2; /* Light grey for even rows */
      }

      #list tbody tr:nth-child(odd) {
        background-color: #ffffff; /* White for odd rows */
      }

      #list tbody tr:hover {
        background-color: #bde0fe; /* Light blue hover effect */
      }

      #list td .btn {
        padding: 8px 12px;
        font-size: 14px;
        border-radius: 5px;
        margin-right: 5px;
      }

      .btn-default {
        background-color: #007bff;
        color: white;
        border: none;
      }

      .btn-default:hover {
        background-color: #0056b3;
      }

      .btn-danger {
        background-color: #ff4d4d;
        color: white;
        border: none;
      }

      .btn-danger:hover {
        background-color: #cc0000;
      }

      @media (max-width: 768px) {
        #list th,
        #list td {
          padding: 10px;
          font-size: 14px;
        }
      }
      /* Container to align both buttons in one line */
.button-container {
  display: flex;
  align-items: center;
  gap: 10px; /* Adds space between buttons */
}

/* General Button Style (Edit/Delete) */
.edit-btn, .delete-btn {
  background-color: transparent;
  padding: 10px 20px;
  border: 2px solid;
  border-radius: 5px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
}

/* Edit Button Styling */
.edit-btn {
  color: #32a852; /* Green Text */
  border-color: #32a852;
}

.edit-btn i {
  margin-right: 8px;
}

.edit-btn:hover {
  background-color: #e8ffe8;
  border-color: #32a852;
}

/* Delete Button Styling */
.delete-btn {
  color: #f54b4b; /* Red Text */
  border-color: #f54b4b;
}

.delete-btn i {
  margin-right: 8px;
}

.delete-btn:hover {
  background-color: #ffe8e8;
  border-color: #f54b4b;
} 
  </style>
  </head>

  <body>
    <div class="header">
      <div>
        <p class="greeting">Welcome Admin</p>
        <h1 class="welcome-title">User Management</h1>
      </div>
  
      <div class="header-right">
        <div class="notification-bell">
          <i class="fas fa-bell"></i>
          <div class="notification-indicator"></div>
        </div>
        <div class="user-profile">
          <img src="https://i.pravatar.cc/100?img=8" alt="Alex Morgan" />
        </div>
      </div>
    </div>
  
    <hr/>
  
    <div class="content-container">
      <div class="table-container">
        <div class="table-header">
          <h2 class="table-title">User List</h2>
          <button class="add-user-btn" id="addUserButton">
            <i class="fas fa-plus"></i> Add User
          </button>
        </div>
  
        <div class="table-wrapper">
          <table id="list">
            <thead>
              <tr>
                <th>Sr. No</th>
                <th>User ID</th>
                <th>Username</th>
                <th>Mobile No</th>
                <th>Date Registered</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  
     
     
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      // Firebase Initialization
      function initializeFirebaseUserTable() {
        console.log("Initializing Firebase User Table...");
        const firebaseConfig = {
          apiKey: "AIzaSyAhTFt7dSyZe8cvMUsGdKBEgJMqH7OOTWI",
          authDomain: "iotbasedentrysystem-c2669.firebaseapp.com",
          databaseURL: "https://iotbasedentrysystem-c2669-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "iotbasedentrysystem-c2669",
        };
    
        // Initialize Firebase app (ensure this happens before any database operations)
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        } else {
          firebase.app(); // Use existing app if already initialized
        }
    
        const dbRef = firebase.database().ref("users"); // Get reference to "users" node
    
        dbRef.on("value", (snapshot) => {
          const userTableBody = document.getElementById("userTableBody");
          userTableBody.innerHTML = ""; // Clear previous data
    
          if (snapshot.exists()) {
            let srNo = 1;
            snapshot.forEach((childSnapshot) => {
              const user = childSnapshot.val();
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${srNo++}</td>
                <td>${childSnapshot.key}</td>
                <td>${user.username || "N/A"}</td>
                <td>${user.mobile || "N/A"}</td>
                <td>${user.dateRegistered || "N/A"}</td>
                <td>
                  <div class="button-container">
                    <button class="edit-btn" onclick="editUser('${childSnapshot.key}')">Edit</button>
                    <button class="delete-btn" onclick="deleteUser('${childSnapshot.key}')">Delete</button>
                  </div>
                </td>
              `;
              userTableBody.appendChild(row);
            });
          } else {
            userTableBody.innerHTML = `<tr><td colspan="6">No user data found.</td></tr>`;
          }
        }, (error) => {
          console.error("Error fetching data:", error);
        });
      }
    
      function editUser(userId) {
        const newUsername = prompt("Enter new username:");
        const newMobile = prompt("Enter new mobile number:");
    
        // Validate inputs
        if (!newUsername || !newMobile) {
          alert("Both username and mobile number are required.");
          return;
        }
    
        if (!/^\d{10}$/.test(newMobile)) { // Validate mobile number format (10 digits)
          alert("Invalid mobile number. Please enter a valid 10-digit number.");
          return;
        }
    
        const userRef = firebase.database().ref("users/" + userId);
    
        userRef.update({
          username: newUsername,
          mobile: newMobile,
        }).then(() => {
          alert("User data updated successfully!");
        }).catch((error) => {
          console.error("Error updating user:", error);
          alert("Failed to update user data. Try again.");
        });
      }
    
      function deleteUser(userId) {
        const confirmation = confirm("Are you sure you want to delete this user?");
        
        if (confirmation) {
          const userRef = firebase.database().ref("users/" + userId);
    
          userRef.remove()
            .then(() => {
              alert("User deleted successfully!");
            })
            .catch((error) => {
              console.error("Error deleting user:", error);
              alert("Failed to delete the user. Try again.");
            });
        }
      }
    
      
    </script>
    
    
    
  </body>
</html>
