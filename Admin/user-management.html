  <body>
    <div class="header">
      <div>
        <p class="greeting">Welcome Admin</p>
        <h1 class="welcome-title">User Management</h1>
      </div>
  
      <div class="header-right">
        <div class="notification-bell">
          <i class="fas fa-bell"></i>
          <div class="notification-indicator"></div>
        </div>
        <div class="user-profile">
          <img src="https://i.pravatar.cc/100?img=8" alt="Alex Morgan" />
        </div>
      </div>
    </div>
  
    <hr/>
  
    <div class="content-container">
      <div class="table-container">
        <div class="table-header">
          <h2 class="table-title">User List</h2>
          <button class="add-user-btn" id="addUserButton">
            <i class="fas fa-plus"></i> Add User
          </button>
        </div>
  
        <div class="table-wrapper">
          <table id="list">
            <thead>
              <tr>
                <th>Sr. No</th>
                <th>User ID</th>
                <th>Username</th>
                <th>Mobile No</th>
                <th>Date Registered</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  
    <!-- Edit User Modal -->
    <div id="editUserModal" style="display: none;">
      <div class="modal-content">
        <h3>Edit User</h3>
        <form id="editUserForm">
          <label for="editUsername">Username:</label>
          <input type="text" id="editUsername" required><br> 
  
          <label for="editMobile">Mobile Number:</label>
          <input type="text" id="editMobile" required><br> 
  
          <input type="hidden" id="userIdToEdit">
          <div id="buttonof">
          <button type="submit" id="submit">Update</button>
          <button type="button" onclick="closeEditModal()">Cancel</button>
        </div>
        </form>
      </div>
    </div>

    <div id="addUserModal" style="display: none;">
      <div class="modal-content">
        <h3>Add User</h3>
        <form id="addUserForm">
          <label for="addUsername">Username:</label>
          <input type="text" id="addUsername" required><br><br>
    
          <label for="addMobile">Mobile Number:</label>
          <input type="text" id="addMobile" required><br><br>
    
          <!-- Take Image Button -->
          <button type="button" id="takeImageBtn" onclick="takeImage()">Take Image</button><br><br>
    
          <!-- Register Mobile Number Option -->
          <label for="registerMobile">Register Mobile Number:</label>
          <a href="https://console.twilio.com/us1/develop/phone-numbers/manage/verified" target="_blank">Click here to register mobile number</a><br><br>
    
          <input type="hidden" id="newUserId">
          <div id="buttonof">
            <button type="submit" id="submit">Add User</button>
            <button type="button" onclick="closeAddModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
      // Firebase Initialization (this function ensures Firebase is initialized only once)
      function initializeFirebase() {
        if (!firebase.apps.length) {
          const firebaseConfig = {
            apiKey: "AIzaSyAhTFt7dSyZe8cvMUsGdKBEgJMqH7OOTWI",
            authDomain: "iotbasedentrysystem-c2669.firebaseapp.com",
            databaseURL: "https://iotbasedentrysystem-c2669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iotbasedentrysystem-c2669",
          };
          firebase.initializeApp(firebaseConfig);
          console.log("Firebase initialized successfully.");
        } else {
          firebase.app(); // Use existing app if already initialized
        }
      }
  
      // Call initializeFirebase once on page load to ensure Firebase is initialized
      initializeFirebase();
  
      // Function to initialize the Firebase User Table
      function initializeFirebaseUserTable() {
        console.log("Initializing Firebase User Table...");
        const dbRef = firebase.database().ref("users"); // Get reference to "users" node
  
        dbRef.on("value", (snapshot) => {
          const userTableBody = document.getElementById("userTableBody");
          userTableBody.innerHTML = ""; // Clear previous data
  
          if (snapshot.exists()) {
            let srNo = 1;
            snapshot.forEach((childSnapshot) => {
              const user = childSnapshot.val();
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${srNo++}</td>
                <td>${childSnapshot.key}</td>
                <td>${user.username || "N/A"}</td>
                <td>${user.mobile || "N/A"}</td>
                <td>${user.dateRegistered || "N/A"}</td>
                <td>
                  <div class="button-container">
                    <button class="edit-btn" onclick="openEditModal('${childSnapshot.key}', '${user.username}', '${user.mobile}')">Edit</button>
                    <button class="delete-btn" onclick="deleteUser('${childSnapshot.key}')">Delete</button>
                  </div>
                </td>
              `;
              userTableBody.appendChild(row);
            });
          } else {
            userTableBody.innerHTML = `<tr><td colspan="6">No user data found.</td></tr>`;
          }
        }, (error) => {
          console.error("Error fetching data:", error);
        });
      }
      
      initializeFirebase();
      // Open Edit Modal and fill the fields
      function openEditModal(userId, currentUsername, currentMobile) {
        document.getElementById("editUserModal").style.display = "block";
        document.getElementById("editUsername").value = currentUsername;
        document.getElementById("editMobile").value = currentMobile;
        document.getElementById("userIdToEdit").value = userId;
      }
  
      // Close the Edit Modal
      function closeEditModal() {
        document.getElementById("editUserModal").style.display = "none";
      }
  
      // Handle form submission to update user
      document.getElementById("editUserForm").addEventListener("submit", function (event) {
        initializeFirebase();
        event.preventDefault(); // Prevent form from submitting normally
        const userId = document.getElementById("userIdToEdit").value;
        const newUsername = document.getElementById("editUsername").value;
        const newMobile = document.getElementById("editMobile").value;
  
        // Validate inputs
        if (!newUsername || !newMobile) {
          alert("Both username and mobile number are required.");
          return;
        }
  
        if (!/^\d{10}$/.test(newMobile)) { // Validate mobile number format (10 digits)
          alert("Invalid mobile number. Please enter a valid 10-digit number.");
          return;
        }
  
        // Update the user data in Firebase
        const userRef = firebase.database().ref("users/" + userId);
        userRef.update({
          username: newUsername,
          mobile: newMobile,
        }).then(() => {
          alert("User data updated successfully!");
          closeEditModal(); // Close the modal after update
        }).catch((error) => {
          console.error("Error updating user:", error);
          alert("Failed to update user data. Try again.");
        });
      });
  
      // Function to delete a user
      function deleteUser(userId) {
        
        initializeFirebase();
        const confirmation = confirm("Are you sure you want to delete this user?");       
        if (confirmation) {
          const userRef = firebase.database().ref("users/" + userId);
  
          userRef.remove()
            .then(() => {
              alert("User deleted successfully!");
            })
            .catch((error) => {
              console.error("Error deleting user:", error);
              alert("Failed to delete the user. Try again.");
            });
        }
      }

      // Open Add User Modal
        document.getElementById('addUserButton').addEventListener('click', function() {
          document.getElementById('addUserModal').style.display = 'block';
        });

        // Close Add User Modal
        function closeAddModal() {
          document.getElementById('addUserModal').style.display = 'none';
        }

        // Handle Add User Form Submission
        document.getElementById("addUserForm").addEventListener("submit", function (event) {
            initializeFirebase();
            event.preventDefault(); // Prevent form submission

            const newUsername = document.getElementById("addUsername").value;
            const newMobile = document.getElementById("addMobile").value;
            
            // Validate inputs
            if (!newUsername || !newMobile) {
                alert("Both username and mobile number are required.");
                return;
            }

            if (!/^\d{10}$/.test(newMobile)) {
                alert("Invalid mobile number. Please enter a valid 10-digit number.");
                return;
            }

            // Get the last user ID from Firebase (or start from 1000 if no data exists)
            const lastUserIdRef = firebase.database().ref("lastUserId");
            lastUserIdRef.once("value").then((snapshot) => {
                let newUserId = 1000; // Default to 1000 if no ID is found

                if (snapshot.exists()) {
                    // If the lastUserId exists, increment it by 1
                    newUserId = snapshot.val() + 1;
                }

                // Store the new user with the newUserId
                const userRef = firebase.database().ref("users/" + newUserId);
                userRef.set({
                    username: newUsername,
                    mobile: newMobile,
                    dateRegistered: new Date().toLocaleDateString(), // Add the current date
                }).then(() => {
                    // Update lastUserId in Firebase to the new value
                    lastUserIdRef.set(newUserId);

                    alert("User added successfully!");
                    closeAddModal(); // Close the modal after adding the user
                }).catch((error) => {
                    console.error("Error adding user:", error);
                    alert("Failed to add user. Try again.");
                });
            });
        });


       function takeImage() {
  // Get the values from the form
  const username = document.getElementById('addUsername').value;
  
  // Send the data to the backend
  fetch('http://localhost:5000/take_image', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      username: username,
    })
  })
  .then(response => response.json())
  .then(data => {
    alert(data.message);  // Show success or error message
  })
  .catch(error => {
    console.error('Error:', error);
    alert('An error occurred while capturing image.');
  });
}

    </script>
